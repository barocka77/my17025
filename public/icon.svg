<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="256" fill="#0f172a"/>

  <!-- Microscope Design -->
  <!-- Base -->
  <rect x="180" y="400" width="152" height="16" rx="8" fill="#60a5fa"/>
  <rect x="200" y="380" width="112" height="24" rx="4" fill="#3b82f6"/>

  <!-- Stage -->
  <rect x="220" y="320" width="72" height="8" rx="4" fill="#60a5fa"/>
  <circle cx="256" cy="324" r="12" fill="#93c5fd" stroke="#3b82f6" stroke-width="2"/>

  <!-- Column -->
  <rect x="245" y="200" width="22" height="180" rx="4" fill="#3b82f6"/>

  <!-- Objective Lens -->
  <path d="M240 320 L256 340 L272 320 L256 325 Z" fill="#60a5fa"/>
  <circle cx="256" cy="318" r="8" fill="#93c5fd"/>

  <!-- Body/Head -->
  <ellipse cx="256" cy="180" rx="45" ry="35" fill="#3b82f6"/>
  <ellipse cx="256" cy="175" rx="38" ry="28" fill="#1e40af"/>

  <!-- Eyepiece -->
  <rect x="246" y="120" width="20" height="60" rx="10" fill="#3b82f6"/>
  <circle cx="256" cy="120" r="14" fill="#60a5fa"/>
  <circle cx="256" cy="120" r="8" fill="#1e40af"/>

  <!-- Arm -->
  <path d="M267 200 Q300 240 290 300 L278 298 Q286 242 260 210 Z" fill="#3b82f6"/>

  <!-- Adjustment Knobs -->
  <circle cx="290" cy="260" r="12" fill="#60a5fa" stroke="#1e40af" stroke-width="2"/>
  <circle cx="290" cy="290" r="10" fill="#60a5fa" stroke="#1e40af" stroke-width="2"/>

  <!-- Light Source -->
  <circle cx="256" cy="390" r="8" fill="#fbbf24"/>
  <circle cx="256" cy="390" r="4" fill="#fef3c7"/>

  <!-- Decorative Elements -->
  <path d="M220 170 Q220 150 240 150" stroke="#60a5fa" stroke-width="3" stroke-linecap="round" fill="none"/>
  <circle cx="245" cy="147" r="3" fill="#60a5fa"/>

  <!-- Shine Effect -->
  <circle cx="235" cy="165" r="6" fill="#93c5fd" opacity="0.6"/>
  <circle cx="225" cy="175" r="4" fill="#93c5fd" opacity="0.4"/>
</svg>
